<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cacao — Hệ thống Quản lý Học tập</title>

    <!-- Google Fonts — Vietnamese + Latin subsets explicitly requested -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!--
      CSS2 API: subset is controlled by the `text` param OR by listing
      `subset=vietnamese` BEFORE the display param. The safest approach
      is to request the full unicode-range for both families by using the
      `family` format that Google Fonts resolves with all subsets
      when &subset=vietnamese is placed AFTER the family list.
    -->
    <link
      href="https://fonts.googleapis.com/css2?family=Kanit:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Space+Grotesk:wght@400;500;600;700&subset=vietnamese&display=swap"
      rel="stylesheet"
    />
  </head>
  <body class="antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
